agent:
  name: Byte
  slug: byte
  version: "0.1.0"
  language: cs  # primární jazyk komunikace

  # Jira identita
  jira:
    display_name: "Byte [AI]"
    account_id: ""       # vyplnit po vytvoření účtu
    avatar: "assets/byte-avatar.png"

  # Bitbucket identita
  bitbucket:
    display_name: "Byte [AI]"
    account_id: ""       # vyplnit po vytvoření účtu

model:
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 4096
  temperature: 0.2      # nízká teplota = konzistentní, technický výstup

skills:
  - review             # code review (z gstack)
  - qa                 # QA testing (z gstack)

# Jira workflow triggery
jira_triggers:
  on_status_change:
    - from: "*"
      to: "In Review"
      action: start_review
    - from: "*"
      to: "Ready for QA"
      action: start_qa
    - from: "*"
      to: "In QA"
      action: start_qa

  on_mention:
    - pattern: "@Byte"
      action: respond_to_mention

  on_comment_keyword:
    - keywords: ["review", "zkontroluj", "code review"]
      action: start_review
    - keywords: ["qa", "otestuj", "test", "bug"]
      action: start_qa

# Limity a bezpečnost
limits:
  max_response_length: 2000    # znaků v Jira komentáři
  max_file_size_review: 500    # KB — větší soubory přeskočí
  rate_limit_per_hour: 30      # max akcí za hodinu
  allowed_jira_projects: []    # prázdné = všechny projekty; nebo ["DEV", "QA"]

  # Co Byte NIKDY nedělá
  forbidden_actions:
    - merge_pull_request
    - deploy_to_production
    - access_production_db
    - execute_shell_from_ticket   # ochrana proti prompt injection

memory:
  enabled: true
  backend: file             # zatím file, pak postgres
  path: ".byte/memory"
  ttl_days: 90              # paměť se maže po 90 dnech
